<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — 10X CRM</title>
  <!-- Runs before CSS/body render, so data-theme is set and an existing
       session is caught before the first frame — otherwise the page
       briefly paints the login form before data.js/guard.js get a
       chance to run and redirect an already-logged-in user away.
       Self-contained on purpose: data.js hasn't loaded yet here, so
       the "crm_theme"/"crm_session" keys are read directly instead of
       using data.js's STORAGE_KEYS/getSession(). -->
  <script>
    document.documentElement.setAttribute("data-theme", localStorage.getItem("crm_theme") || "light");
    if (localStorage.getItem("crm_session")) {
      window.location.href = "dashboard.html";
    }
  </script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="logo-row">
        <div class="logo-mark">10X</div>
        <strong>10X CRM</strong>
      </div>
      <h1>Welcome back</h1>
      <p>Log in to see today's pipeline.</p>

      <form id="login-form" novalidate>
        <div class="field">
          <label for="login-email">Email</label>
          <input type="text" id="login-email" name="email" placeholder="name@company.com" />
          <div class="field-error" data-error-for="email"></div>
        </div>
        <div class="field">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" name="password" placeholder="Your password" />
          <div class="field-error" data-error-for="password"></div>
        </div>
        <button type="submit" class="btn-primary btn-block">Log in</button>
      </form>

      <p class="auth-footer">Don't have an account? <a href="signup.html">Sign up</a></p>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/guard.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
