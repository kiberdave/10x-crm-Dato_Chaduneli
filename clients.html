<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clients — 10X CRM</title>
  <!-- Runs before CSS/body render, so data-theme is already set on the
       first frame — otherwise the page briefly paints the default
       (light) theme before data.js/guard.js get a chance to run.
       Self-contained on purpose: data.js hasn't loaded yet here, so
       the "crm_theme" key is written out directly instead of using
       data.js's STORAGE_KEYS.THEME. -->
  <script>
    document.documentElement.setAttribute("data-theme", localStorage.getItem("crm_theme") || "light");
  </script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-shell">
    <nav class="sidebar">
      <a href="dashboard.html" class="logo">
        <div class="logo-mark">10X</div>
        10X CRM
      </a>
      <div class="sidebar-menu">
        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="clients.html" class="nav-link">Clients</a>
        <a href="profile.html" class="nav-link">Profile</a>
      </div>

      <div class="sidebar-bottom">
        <div class="nav-link theme-toggle">
          <span class="theme-toggle-label">Dark mode</span>
          <span class="theme-toggle-icon" aria-hidden="true"></span>
          <button id="theme-toggle" class="switch" aria-label="Toggle dark mode"></button>
        </div>
        <button id="logout-btn" class="nav-link logout-btn">
          Logout
        </button>
      </div>
    </nav>

    <main class="main">
      <div class="page-header">
        <h1>Clients</h1>
        <button id="add-client-btn" class="btn-primary">+ Add client</button>
      </div>

      <div class="toolbar">
        <input type="text" id="search-input" placeholder="Search by name or company" />
        <!-- real <button>s, not <span>s: focusable with Tab, Enter/Space work -->
        <div class="chip-group">
          <button type="button" class="chip active" data-status="All">All</button>
          <button type="button" class="chip" data-status="Lead">Lead</button>
          <button type="button" class="chip" data-status="Contacted">Contacted</button>
          <button type="button" class="chip" data-status="Won">Won</button>
          <button type="button" class="chip" data-status="Lost">Lost</button>
        </div>
        <select id="sort-select" class="sort-select">
          <option value="newest">Sort: newest first</option>
          <option value="name">Sort: name A-Z</option>
          <option value="value">Sort: deal value high-low</option>
        </select>
      </div>

      <div id="client-list" class="client-list"></div>
    </main>
  </div>

  <!-- Add client modal -->
  <div id="add-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h3 id="add-modal-title">Add client</h3>
        <button id="add-modal-close" aria-label="Close">&times;</button>
      </div>
      <form id="add-client-form" novalidate>
        <div class="field">
          <label for="add-name">Name</label>
          <input type="text" id="add-name" name="clientName" placeholder="Jane Cooper" />
          <div class="field-error" data-error-for="clientName"></div>
        </div>
        <div class="field">
          <label for="add-email">Email</label>
          <input type="text" id="add-email" name="email" placeholder="name@company.com" />
          <div class="field-error" data-error-for="email"></div>
        </div>
        <div class="field">
          <label for="add-phone">Phone</label>
          <input type="text" id="add-phone" name="phone" placeholder="+995 555 12 34 56" />
          <div class="field-error" data-error-for="phone"></div>
        </div>
        <div class="field">
          <label for="add-company">Company</label>
          <input type="text" id="add-company" name="company" placeholder="Company name" />
          <div class="field-error" data-error-for="company"></div>
        </div>
        <div class="field">
          <label for="add-avatar-url">Avatar URL (optional)</label>
          <input type="text" id="add-avatar-url" name="avatarUrl" placeholder="https://example.com/photo.jpg" />
          <div class="field-error" data-error-for="avatarUrl"></div>
        </div>
        <div class="modal-row-2">
          <div class="field">
            <label for="add-value">Deal value</label>
            <!-- inputmode: phones open the numeric keyboard right away -->
            <input type="text" inputmode="numeric" id="add-value" name="dealValue" placeholder="5000" />
            <div class="field-error" data-error-for="dealValue"></div>
          </div>
          <div class="field">
            <label for="add-status">Status</label>
            <select id="add-status" name="status">
              <option value="Lead" selected>Lead</option>
              <option value="Contacted">Contacted</option>
              <option value="Won">Won</option>
              <option value="Lost">Lost</option>
            </select>
          </div>
        </div>
        <button type="submit" id="add-submit-btn" class="btn-primary btn-block">Add client</button>
      </form>
    </div>
  </div>

  <!-- Client detail modal -->
  <div id="detail-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h3>Client details</h3>
        <button id="detail-modal-close" aria-label="Close">&times;</button>
      </div>

      <div class="detail-header">
        <div class="avatar" id="detail-avatar"></div>
        <div>
          <p id="detail-name"></p>
          <p class="detail-meta" id="detail-meta"></p>
        </div>
      </div>

      <div class="row-actions">
        <button id="detail-edit-btn" class="btn-sm">Edit</button>
        <button id="detail-delete-btn" class="btn-danger btn-sm">Delete</button>
      </div>

      <table class="kv-table">
        <tr><td class="text-muted">Email</td><td id="detail-email"></td></tr>
        <tr><td class="text-muted">Phone</td><td id="detail-phone"></td></tr>
        <tr><td class="text-muted">Company</td><td id="detail-company"></td></tr>
      </table>

      <h3>Notes</h3>
      <div id="notes-list" class="notes-list"></div>
      <div class="add-note-row">
        <input type="text" id="note-input" placeholder="Write a note…" />
        <button id="add-note-btn">Add note</button>
      </div>

      <button id="remind-btn" class="btn-block">Remind me in 1 min</button>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/guard.js"></script>
  <script src="js/clients.js"></script>
</body>
</html>
